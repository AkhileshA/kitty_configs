# Active theme lives at configs/active.conf, a symlink to one of the
# variants in configs/. Switch with: ~/.config/kitty/switch-theme.sh <name>
# then reload with ctrl+shift+F5 (or restart kitty).
include configs/active.conf

# F11: go fullscreen and force full opacity at the same time; pressing it
# again drops back out of fullscreen and restores the theme's transparency.
map f11 launch --type=background --allow-remote-control ~/.config/kitty/toggle_fullscreen_opacity.sh

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
