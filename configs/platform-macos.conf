# macOS-specific overrides. Selected by switch-theme.sh via the
# configs/platform.conf symlink, and included after the active theme so
# these settings win over the theme's font_family.
#
# Adwaita Mono is a GNOME font that isn't on macOS. JetBrainsMono Nerd Font
# is a good drop-in that also renders the powerline separators the themes use:
#   brew install --cask font-jetbrains-mono-nerd-font
# If it's not installed, kitty falls back to Menlo automatically.
font_family JetBrainsMono Nerd Font

# Treat the Option key as Alt so the alt+1..9 tab bindings work, and let macOS
# hand the F-keys to kitty (needed for the F11 fullscreen binding).
macos_option_as_alt yes
