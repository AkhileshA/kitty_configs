# ── Nord (clean) ─────────────────────────────────────────
# Cool, low-contrast palette. Tab bar hidden until needed,
# thin cursor, tight but comfortable spacing.

font_family      Adwaita Mono
font_size        12.5

background_opacity 1.0
window_padding_width 10

tab_bar_edge     bottom
tab_bar_style    fade
tab_bar_min_tabs 2
tab_title_template "{title}"

cursor_shape     beam
cursor_beam_thickness 1.5
cursor_blink_interval 0

# Nord palette
foreground #d8dee9
background #2e3440
selection_foreground #2e3440
selection_background #88c0d0
cursor #d8dee9

active_border_color   #88c0d0
inactive_border_color #4c566a

active_tab_foreground   #2e3440
active_tab_background   #88c0d0
inactive_tab_foreground #6c7686
inactive_tab_background #3b4252
tab_bar_background      #2e3440

color0  #3b4252
color8  #4c566a
color1  #bf616a
color9  #bf616a
color2  #a3be8c
color10 #a3be8c
color3  #ebcb8b
color11 #ebcb8b
color4  #81a1c1
color12 #81a1c1
color5  #b48ead
color13 #b48ead
color6  #88c0d0
color14 #8fbcbb
color7  #e5e9f0
color15 #eceff4
