# ── Catppuccin Latte (eye-candy) ─────────────────────────
# The light sibling of the family — same eye-candy recipe:
# translucent background, generous padding, fancy tab bar,
# animated blink, cursor trail, soft bell flash, hover scrollbar.

font_family      Adwaita Mono
bold_font        auto
italic_font      auto
font_size        13.0

background_opacity 0.92
background_blur    32
dynamic_background_opacity yes

window_padding_width 14
window_margin_width  2
hide_window_decorations no
resize_debounce_time 0.1 0.3

cursor_shape          beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 10.0

cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 1
cursor_trail_color           #8839ef

visual_bell_duration 0.25 ease-out
visual_bell_color    #8839ef
window_alert_on_bell yes
bell_border_color    #8839ef

scrollbar                     hovered
scrollbar_width               0.5
scrollbar_hover_width         1.2
scrollbar_handle_opacity      0.55
scrollbar_track_opacity       0
scrollbar_track_hover_opacity 0.12
scrollbar_radius              0.3
scrollbar_handle_color        #8839ef

tab_bar_edge         bottom
tab_bar_style        powerline
tab_powerline_style  slanted
tab_title_template   " {title} "

# Note: powerline separators render best with a Nerd Font installed.
# Falls back to plain style automatically if glyphs are missing.

