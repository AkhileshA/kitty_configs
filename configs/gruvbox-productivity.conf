# ── Gruvbox (productivity) ───────────────────────────────
# Optimized for heavy tmux-less split/tab workflows: tighter
# density, remote control on, quick layout/nav keybindings.

font_family      Adwaita Mono
font_size        11.5

background_opacity 1.0
window_padding_width 4

tab_bar_edge     top
tab_bar_style    separator
tab_separator    " | "
tab_title_template "{index}: {title}"

# Enable remote control + listening socket so kitten @ commands / scripts work
allow_remote_control yes
listen_on unix:/tmp/kitty-productivity

enabled_layouts tall,fat,grid,horizontal,vertical,stack

# Gruvbox Dark palette
foreground #ebdbb2
background #282828
selection_foreground #282828
selection_background #d5c4a1
cursor #ebdbb2
cursor_shape underline

color0  #282828
color8  #928374
color1  #cc241d
color9  #fb4934
color2  #98971a
color10 #b8bb26
color3  #d79921
color11 #fabd2f
color4  #458588
color12 #83a598
color5  #b16286
color13 #d3869b
color6  #689d6a
color14 #8ec07c
color7  #a89984
color15 #ebdbb2

active_tab_foreground   #282828
active_tab_background   #fabd2f
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

# ── Splits / layout keybindings ──
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+minus launch --location=vsplit
map ctrl+shift+z toggle_layout stack
map ctrl+shift+l next_layout

map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+semicolon neighboring_window right

map ctrl+shift+r start_resizing_window
