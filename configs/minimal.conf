# ── Minimal ──────────────────────────────────────────────
# No frills: solid background, no tab bar clutter, just a terminal.

font_family      Adwaita Mono
font_size        12.0

background       #1e1e1e
foreground       #e0e0e0
cursor           #e0e0e0
cursor_shape     block
background_opacity 1.0

window_padding_width 8
hide_window_decorations no

# Tab bar only shows when you actually have >1 tab, and stays plain
tab_bar_edge     bottom
tab_bar_style    fade
tab_bar_min_tabs 2

enable_audio_bell no
confirm_os_window_close 0

# Basic 16-color palette (xterm-ish, low saturation)
color0  #1e1e1e
color1  #cc6666
color2  #b5bd68
color3  #f0c674
color4  #81a2be
color5  #b294bb
color6  #8abeb7
color7  #e0e0e0
color8  #666666
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #ffffff
